version: '3.8'

services:
  rocketchat:
    image: rocketchat/rocket.chat:latest
    container_name: itmanager-rocketchat
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - ROOT_URL=http://localhost:3001
      - MONGO_URL=mongodb://mongo:27017/rocketchat
      - MONGO_OPLOG_URL=mongodb://mongo:27017/local
      - REGISTRATION_ENABLED=false
      - CATALYST=true
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: itmanager-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
